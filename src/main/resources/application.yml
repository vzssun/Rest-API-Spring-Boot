spring:
  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: password
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  application:
    name: USER-SERVICE

security:
  jwt:
    secret-key: b61b8b5d03e970bf45205bb4c423bda72138d9907da802207758ee337c0986c6
    expiration: 86400000  # 1 dia em milissegundos
logging:
  level:
    "[org.springframework.security]": DEBUG # Shows detailed security logs (authentication, authorization, filters)
    "[org.springframework.web]": DEBUG # Shows details of HTTP requests, route mappings
    "[org.springframework.boot.autoconfigure]": DEBUG # Shows auto-configuration decisions
    "[restapi.spring.project]": DEBUG # Maximum level of detail for your own code (custom package)
server:
  port: 8080

remote-service:
  api-key: ${MY_APP_API_KEY:default_value_if_not_found}
  base-url: "http://localhost:8080/api"
  timeout: 5000

rate-limit:
  policies:
    - path: "/api/books/**"
      capacity: 30
      refill-tokens: 30
      refill-duration: 1m
    - path: "/**"
      capacity: 5
      refill-tokens: 5
      refill-duration: 1m